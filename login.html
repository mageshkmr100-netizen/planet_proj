<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Planet Ceres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0b0712 0%, #1a0f2e 100%);
            min-height: 100vh;
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .glow-input:focus {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Magical header -->
        <div class="text-center mb-8">
            <i class="fas fa-moon-stars text-5xl text-yellow-300 floating mb-3"></i>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Welcome Back ✨</h1>
            <p class="text-gray-400 mt-2">Enter your credentials to access Planet Ceres</p>
        </div>

        <!-- Login Card -->
        <div class="bg-[#1a1227]/90 backdrop-blur-sm rounded-2xl shadow-2xl border border-purple-500/30 p-8">
            <form id="loginForm">
                <div class="mb-5">
                    <label class="block text-purple-300 mb-2 text-sm"><i class="fas fa-user mr-2"></i>Username / Magical ID</label>
                    <input type="text" id="username" placeholder="e.g., StarlightExplorer" 
                           class="w-full bg-[#2e1d3e] border border-purple-400/40 rounded-xl p-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 glow-input">
                </div>
                <div class="mb-5">
                    <label class="block text-purple-300 mb-2 text-sm"><i class="fas fa-lock mr-2"></i>Password</label>
                    <input type="password" id="password" placeholder="Your magical password" 
                           class="w-full bg-[#2e1d3e] border border-purple-400/40 rounded-xl p-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <p id="errorMsg" class="text-red-400 text-sm mb-4"></p>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 py-3 rounded-xl font-bold text-white transition transform hover:scale-105">
                    <i class="fas fa-meteor mr-2"></i> Enter Ceres
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-400 text-sm">Don't have a visa yet?</p>
                <a href="register.html" class="text-purple-400 hover:text-purple-300 transition font-semibold">✨ Register as Citizen or Tourist ✨</a>
            </div>
            
            <div class="mt-6 pt-4 border-t border-purple-500/20 text-center text-xs text-gray-500">
                <i class="fas fa-dragon"></i> Demo accounts: StarlightExplorer/ceres123 | MageEldrin/magic456
            </div>
        </div>
        
        <!-- Back to planet link -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-purple-400 hover:text-purple-300 text-sm transition"><i class="fas fa-arrow-left mr-1"></i> Back to Planet Ceres</a>
        </div>
    </div>

    <script src="js/script.js"></script
